server {
  listen 80;
  server_name _;

  # Serve built frontend
  root /usr/share/nginx/html;
  index index.html;

  # React router fallback (even if you don't use routing yet)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Resolver: Docker's embedded DNS (127.0.0.11). Required so proxy_pass
  # with a variable re-resolves the upstream host when api container restarts.
  resolver 127.0.0.11 valid=10s;
  set $api_upstream http://api:8000;

  # Proxy API calls to FastAPI
  location /api/ {
    proxy_pass $api_upstream/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}