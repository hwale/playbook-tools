server {
  listen 80;
  server_name _;

  # Serve built frontend
  root /usr/share/nginx/html;
  index index.html;

  # React router fallback (even if you don't use routing yet)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Resolver: Docker's embedded DNS (127.0.0.11). Required so proxy_pass
  # with a variable re-resolves the upstream host when api container restarts.
  resolver 127.0.0.11 valid=10s;
  set $api_upstream http://api:8000;

  # Proxy API calls to FastAPI.
  # NOTE: proxy_pass with a variable does NOT strip the location prefix
  # automatically — we must rewrite explicitly before passing to the backend.
  location /api/ {
    rewrite ^/api/(.*) /$1 break;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Required for SSE streaming — disable buffering so tokens flow immediately.
    proxy_buffering off;
    proxy_cache off;
  }
}