    details: `
      <div class="detail-section">
        <div class="detail-label">The Simple Explanation</div>
        <div class="detail-text">
          <p>When you upload a PDF, we can't just throw the entire document at the LLM — it's too big and too expensive. So we cut it into smaller pieces called <strong>chunks</strong>. Each chunk gets turned into a vector (a list of numbers that represents the meaning) and stored in our vector database.</p>
          <p>The old way: we just counted characters. Every 500 characters, we made a cut. Problem? Sometimes that cut landed right in the middle of a sentence: <code>"The company's total reve-"</code> in one chunk and <code>"nue was $280 billion."</code> in the next. Neither chunk makes sense on its own.</p>
          <p>The new way: <strong>semantic chunking</strong>. We cut on natural boundaries — paragraph breaks first, then sentence breaks. This means every chunk contains complete thoughts.</p>
        </div>
        <div class="analogy">
          <div class="analogy-label">Analogy</div>
          Imagine cutting a pizza. Character chunking is like placing a ruler on the pizza and cutting every 3 inches — you'll cut through toppings, through the crust, wherever. Semantic chunking is like cutting along the natural slice lines — each piece is a complete, eat-able slice.
        </div>

          <div class="step"><span class="step-num">Pass 2</span> If any paragraph is still too big (>chunk_size), split it further on sentence endings (periods, question marks).</div>
          <div class="step"><span class="step-num">Pass 3</span> Merge tiny consecutive segments back together. If paragraph A is 50 chars and paragraph B is 80 chars, and our limit is 500, combine them into one chunk. No point having tiny chunks.</div>
          <div class="step"><span class="step-num">Pass 4</span> Add overlap — copy the last 1-2 sentences of each chunk to the beginning of the next chunk. This way, if an important idea spans two chunks, both chunks contain the full context.</div>

        </div>
      </div>

        </div>
      </div>

        <div class="detail-text">
          <p>Sometimes the agent gives a bad answer — it might hallucinate a number, miss part of the question, or answer based on general knowledge instead of the uploaded document. Without a verifier, that bad answer goes straight to the user.</p>
          <p>The verifier is a <strong>second LLM</strong> that reads the agent's answer and asks three questions: (1) Is it relevant to what the user asked? (2) Is it complete — did it answer the whole question? (3) Is it grounded — does it come from the document, not from the LLM's imagination?</p>

        <div class="detail-label">What Is Reciprocal Rank Fusion (RRF)?</div>
        <div class="detail-text">
          <p>When you search 3 sub-queries, you get 3 separate ranked lists of chunks. How do you combine them into one final list? You can't just compare their similarity scores directly — the scales might be different.</p>
          <p><strong>RRF</strong> ignores the scores entirely and only looks at <strong>rank position</strong>. If a chunk appears as #1 in one search and #3 in another, it gets a high combined score. The formula is simple: <code>score = 1/(rank + 60)</code> for each search it appears in, summed up. The 60 is a constant that prevents the #1 result from dominating too much.</p>
        </div>
        <div class="analogy">
          <div class="analogy-label">Analogy</div>
          Three friends each independently rank their top 5 restaurants. Restaurant A is #1 for friend 1 and #3 for friend 2. Restaurant B is #2 for all three friends. RRF would rank Restaurant B higher because it consistently scored well across all lists, even though Restaurant A was #1 on one list.
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-label">How It Works Step By Step</div>
        <div class="how-it-works">
          <div class="step"><span class="step-num">1.</span> User asks: "Compare P/E ratio to revenue growth in 2016"</div>
          <div class="step"><span class="step-num">2.</span> gpt-4o-mini decomposes → ["P/E ratio 2016", "revenue growth 2016"]</div>
          <div class="step"><span class="step-num">3.</span> Search vector DB for "P/E ratio 2016" → get top 6 chunks</div>
          <div class="step"><span class="step-num">4.</span> Search vector DB for "revenue growth 2016" → get top 6 chunks</div>
          <div class="step"><span class="step-num">5.</span> RRF merges both lists → final ranked list of best chunks from both searches</div>
          <div class="step"><span class="step-num">6.</span> Top 6 chunks from merged list sent to the agent as context</div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-label">When Is Decomposition Skipped?</div>
        <div class="detail-text">
          <p>Simple questions like "What is the stock price?" only produce 1 sub-query — which is the original question itself. In that case, we skip RRF entirely and do a single search. The decomposition LLM is smart enough to not split questions that don't need splitting.</p>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Interview Soundbite</div>
        <div class="interview-box">
          <div class="interview-label">System Design Interview</div>
          "For complex queries, we use query decomposition via a cheap LLM to split into sub-queries, search each independently, and merge results using Reciprocal Rank Fusion. RRF is rank-based, not score-based, which makes it robust across different embedding spaces. For simple queries, the decomposer returns a single query and we skip the fusion step entirely — zero overhead for the common case."
        </div>
      </div>
      <div class="detail-section">

          <p>Next time you ask a similar question in a <em>new</em> session, we search FAISS for similar past questions, look up the original answers from PostgreSQL, and inject them into the prompt as context. The agent now "remembers" what it said before.</p>

        <div class="detail-text">
          <p>We embed the <strong>question</strong>, not the answer. Why? Because when a new question comes in, we want to find <em>similar past questions</em>. If we embedded the answer too, the vector would be polluted with details that make similarity matching harder. The question is the key — the answer is the value we look up.</p>

          <p>We use <code>IndexFlatL2</code>, which is the simplest FAISS index — it compares every stored vector to the query vector using L2 (Euclidean) distance. This is fine for our scale (thousands of questions). At millions of questions, you'd switch to an approximate index like IVF for speed.</p>

      <div class="detail-section">
        <div class="detail-label">The Simple Explanation</div>
        <div class="detail-text">
          <p>Our agent uses <strong>streaming</strong> — tokens (words) appear one at a time in the UI as the LLM generates them, instead of waiting for the entire response. This is what makes ChatGPT feel fast — you see words appearing in real-time.</p>
          <p>The problem: our agent now has <strong>multiple LLMs</strong> running inside it — the main agent, the query decomposer, and the verifier. All of them produce tokens. Our streaming code was catching tokens from <em>all</em> of them and sending them to the UI. So when the decomposer produced <code>{"queries":["P/E ratio","revenue growth"]}</code>, that JSON appeared in the user's chat!</p>
          <p>The fix was simple: instead of "stream everything except the verifier" (<code>!= "verifier"</code>), we changed it to "only stream the agent" (<code>== "agent"</code>). One line change.</p>
        </div>
        <div class="analogy">
          <div class="analogy-label">Analogy</div>
          Imagine a restaurant where the kitchen has an open window to the dining room. Before the fix, every conversation in the kitchen was audible — the chef discussing ingredients, the dishwasher complaining. After the fix, only the waiter's voice (the agent's response) reaches the dining room. The kitchen chatter (decomposer, verifier) stays in the kitchen.
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-label">The One-Line Fix</div>
        <div class="code-snippet"><span class="comment"># Before (broken):</span>
<span class="keyword">elif</span> kind == <span class="string">"on_chat_model_stream"</span> <span class="keyword">and</span> node_name != <span class="string">"verifier"</span>:

<span class="comment"># After (fixed):</span>
<span class="keyword">elif</span> kind == <span class="string">"on_chat_model_stream"</span> <span class="keyword">and</span> node_name == <span class="string">"agent"</span>:</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Why This Matters Architecturally</div>
        <div class="detail-text">
          <p>As your system grows and you add more internal LLM calls (re-rankers, summarizers, classifiers), the exclusion approach (<code>!= "verifier"</code>) breaks every time you add a new component — you'd have to update the filter for each one. The inclusion approach (<code>== "agent"</code>) is future-proof: only the one thing you explicitly want to stream gets through, regardless of how many internal components you add later.</p>
