services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    volumes:
      - ./.data:/repo/.data
    working_dir: /repo/services/api
    env_file:
      - ./services/api/.env
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - api
