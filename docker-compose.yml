services:
  postgres:
    image: postgres:16-alpine
    # These must match DATABASE_URL in your .env.
    environment:
      POSTGRES_USER: playbook
      POSTGRES_PASSWORD: playbook
      POSTGRES_DB: playbook
    volumes:
      # Named volume — data survives container restarts and rebuilds.
      # Without this, every `docker compose down` wipes your database.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready checks that Postgres is accepting connections.
      # The api service waits for this before starting.
      test: ["CMD-SHELL", "pg_isready -U playbook"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    volumes:
      - ./.data:/repo/.data
    working_dir: /repo/services/api
    env_file:
      - ./services/api/.env
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    # No external port — web is internal-only. Caddy is the only public entry point.
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"    # HTTP (Let's Encrypt challenge + redirect to HTTPS)
      - "443:443"  # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro  # config from repo — no SSH needed to change it
      - caddy_data:/data                      # Let's Encrypt certs — must persist across restarts
      - caddy_config:/config                  # Caddy internal state cache
    depends_on:
      - web
    restart: unless-stopped

# Named volumes are managed by Docker and persist independently of containers.
# `docker compose down` removes containers but NOT volumes.
# `docker compose down -v` removes both — use only when you want a clean slate.
volumes:
  postgres_data:
  caddy_data:    # Let's Encrypt certs
  caddy_config:  # Caddy config cache
