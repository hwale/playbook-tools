services:
  postgres:
    # In dev, expose 5432 so you can connect with a local DB client
    # (TablePlus, pgAdmin, psql) without going through Docker.
    # Connection string: postgresql://playbook:playbook@localhost:5432/playbook
    ports:
      - "5432:5432"

  api:
    ports:
      - "8000:8000"
    volumes:
      - ./:/repo
      - ./.data:/repo/.data
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
