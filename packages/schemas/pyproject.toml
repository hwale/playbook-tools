[project]
name = "playbook-schemas"
version = "0.1.0"
description = "Versioned JSON-schema contracts for Playbook Tools"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]